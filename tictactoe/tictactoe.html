<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字遊戲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#3D8B7E;--primary-light:#5DA99B;--primary-surface:#E6F3F0;
    --accent:#E8B84B;--text:#2C3E3A;--text-dim:#7A8F8B;--text-muted:#A9BCB8;
    --bg:#F5F8F7;--surface:#FFFFFF;--border:#D6E4E0;--border-light:#E8F0ED;
    --o-color:#3D8B7E;--x-color:#D9655B;
    --radius:16px;--radius-sm:10px;
    --mode-pvp:#3D8B7E;--mode-pvc:#D9655B;
    --shadow:0 2px 8px rgba(61,139,126,0.06),0 8px 32px rgba(61,139,126,0.04)
  }
  body{
    font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    background-image:radial-gradient(ellipse 600px 400px at 10% 20%,rgba(61,139,126,0.04) 0%,transparent 100%);
    background-attachment:fixed;display:flex;flex-direction:column
  }
  .header{
    background:linear-gradient(135deg,var(--primary) 0%,#2D6B60 100%);color:#fff;padding:0 24px;
    box-shadow:0 4px 20px rgba(45,107,96,0.15)
  }
  .header-inner{
    max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:center;height:64px
  }
  .header h1{font-size:18px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  .main{max-width:500px;margin:0 auto;padding:32px 24px 60px;flex:1;display:flex;flex-direction:column}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes drawLine{to{stroke-dashoffset:0}}
  .mode-toggle{
    display:flex;gap:0;margin-bottom:20px;border-radius:var(--radius-sm);
    border:1.5px solid var(--border);overflow:hidden;background:var(--bg)
  }
  .mode-btn{
    flex:1;padding:10px 16px;border:none;font-size:13px;font-weight:600;
    font-family:inherit;cursor:pointer;transition:all .25s;
    background:transparent;color:var(--text-dim)
  }
  .mode-btn:not(:last-child){border-right:1.5px solid var(--border)}
  .mode-btn:hover{color:var(--text);background:rgba(0,0,0,0.02)}
  .mode-btn.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .mode-btn[data-mode="pvp"].active{color:var(--mode-pvp)}
  .mode-btn[data-mode="pvc"].active{color:var(--mode-pvc)}
  .diff-select{
    display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:20px
  }
  .diff-select.show{display:flex}
  .diff-select label{font-size:13px;color:var(--text-dim);font-weight:500}
  .diff-select select{
    padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;
    font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;cursor:pointer
  }
  .diff-select select:focus{border-color:var(--primary)}
  .game-card{
    background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:28px 32px;border:1px solid var(--border-light);position:relative;overflow:hidden;animation:fadeUp .4s ease
  }
  .game-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--primary),var(--accent),var(--primary));
    background-size:200% 100%;animation:shimmer 4s ease-in-out infinite
  }
  @keyframes shimmer{0%,100%{background-position:0% 0%}50%{background-position:100% 0%}}
  .turn-indicator{
    display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px;
    padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm);
    border:1.5px solid var(--border-light)
  }
  .turn-badge{
    display:flex;align-items:center;gap:6px;padding:6px 16px;border-radius:8px;
    font-size:14px;font-weight:600;transition:all .3s;opacity:.35
  }
  .turn-badge.active{opacity:1;transform:scale(1.05)}
  .turn-badge.x{color:var(--x-color);background:rgba(217,101,91,0.08)}
  .turn-badge.o{color:var(--o-color);background:rgba(61,139,126,0.08)}
  .turn-badge .icon{font-size:20px;font-weight:900}
  .turn-arrow{color:var(--text-muted);font-size:18px;transition:all .3s}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;aspect-ratio:1;width:100%}
  .cell{
    aspect-ratio:1;border:2px solid var(--border);border-radius:14px;
    background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:48px;font-weight:900;transition:all .2s;position:relative;user-select:none
  }
  .cell:hover{border-color:var(--primary-light);background:var(--primary-surface);transform:translateY(-1px)}
  .cell:active{transform:scale(.94)}
  .cell.disabled{cursor:default;opacity:1}
  .cell.disabled:hover{transform:none;background:var(--bg);border-color:var(--border)}
  .cell.x{color:var(--x-color);border-color:var(--x-color);background:rgba(217,101,91,0.06)}
  .cell.o{color:var(--o-color);border-color:var(--o-color);background:rgba(61,139,126,0.06)}
  .cell.win{
    animation:pop .4s ease;z-index:1
  }
  .cell.win.x{background:rgba(217,101,91,0.15);border-color:var(--x-color);box-shadow:0 0 0 4px rgba(217,101,91,0.1)}
  .cell.win.o{background:rgba(61,139,126,0.15);border-color:var(--o-color);box-shadow:0 0 0 4px rgba(61,139,126,0.1)}
  .result-banner{
    text-align:center;padding:16px;border-radius:var(--radius-sm);margin-bottom:20px;
    font-size:18px;font-weight:700;animation:fadeUp .3s ease
  }
  .result-banner.win-x{background:rgba(217,101,91,0.1);color:var(--x-color);border:1.5px solid rgba(217,101,91,0.2)}
  .result-banner.win-o{background:rgba(61,139,126,0.1);color:var(--o-color);border:1.5px solid rgba(61,139,126,0.2)}
  .result-banner.draw{background:#FEF9E7;color:#7D6608;border:1.5px solid #F9E79F}
  .actions{display:flex;gap:10px;justify-content:center}
  .btn{
    padding:11px 32px;border:none;border-radius:var(--radius-sm);font-size:14px;
    font-weight:600;font-family:inherit;cursor:pointer;transition:all .25s;letter-spacing:.3px
  }
  .btn:active{transform:scale(0.96)}
  .btn-primary{
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);
    color:#fff;box-shadow:0 4px 16px rgba(61,139,126,0.3)
  }
  .btn-primary:hover{box-shadow:0 6px 24px rgba(61,139,126,0.4);transform:translateY(-1px)}
  .scoreboard{
    display:flex;justify-content:center;gap:32px;margin-bottom:20px;
    padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm);
    border:1.5px solid var(--border-light);font-size:14px
  }
  .score-item{display:flex;align-items:center;gap:6px}
  .score-item .num{font-weight:800;font-size:18px}
  .score-item.x .num{color:var(--x-color)}
  .score-item.o .num{color:var(--o-color)}
  .score-item.draw-score .num{color:var(--text-dim)}
  .history{margin-top:16px}
  .history summary{cursor:pointer;font-size:13px;color:var(--text-dim);padding:8px 0;user-select:none}
  .history-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;max-height:160px;overflow-y:auto}
  .history-item{font-size:12px;color:var(--text-dim);padding:4px 8px;border-radius:4px;background:var(--bg)}
  .history-item .winner-x{color:var(--x-color);font-weight:600}
  .history-item .winner-o{color:var(--o-color);font-weight:600}
  .history-item .winner-draw{color:#7D6608;font-weight:600}
  @media(max-width:500px){
    .game-card{padding:20px 16px}
    .cell{font-size:36px}
    .main{padding:20px 12px 40px}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>⭕ 井字遊戲 ✕ <span id="headerSub" style="font-weight:300;font-size:12px;opacity:.75">雙人對戰</span></h1>
  </div>
</div>

<div class="main">
  <div class="game-card">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="pvp" onclick="setMode('pvp')">👥 雙人對戰</button>
      <button class="mode-btn" data-mode="pvc" onclick="setMode('pvc')">🤖 與電腦對戰</button>
    </div>
    <div class="diff-select" id="diffSelect">
      <label>電腦難度：</label>
      <select id="diffLevel" onchange="onDiffChange()">
        <option value="easy">😊 簡單</option>
        <option value="medium" selected>🤔 中等</option>
        <option value="hard">😈 困難</option>
      </select>
    </div>
    <div class="scoreboard">
      <span class="score-item x">✕ <span class="num" id="scoreX">0</span></span>
      <span class="score-item draw-score">─ <span class="num" id="scoreDraw">0</span></span>
      <span class="score-item o">⭕ <span class="num" id="scoreO">0</span></span>
    </div>

    <div class="turn-indicator">
      <div class="turn-badge x" id="turnX">✕ <span id="player1Label">玩家1</span></div>
      <span class="turn-arrow" id="turnArrow">→</span>
      <div class="turn-badge o" id="turnO">⭕ <span id="player2Label">玩家2</span></div>
    </div>

    <div id="resultArea"></div>

    <div class="board" id="board"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="resetBoard()">🔄 重新開始</button>
      <button class="btn" style="background:transparent;color:var(--text-dim);border:1.5px solid var(--border)" onclick="resetAll()">⟳ 重置比分</button>
    </div>

    <div class="history">
      <details>
        <summary>📋 對戰紀錄</summary>
        <div class="history-list" id="historyList"><div style="font-size:12px;color:var(--text-muted)">尚無紀錄</div></div>
      </details>
    </div>
  </div>
</div>

<script>
  const boardEl = document.getElementById('board')
  const resultArea = document.getElementById('resultArea')
  const historyList = document.getElementById('historyList')
  const headerSub = document.getElementById('headerSub')
  let board, currentPlayer, gameActive, scores, history
  let gameMode = 'pvp'
  let diffLevel = 'medium'
  let computerTimeout = null

  function init() {
    scores = { X: 0, O: 0, draw: 0 }
    history = []
    resetBoard()
  }

  function setMode(mode) {
    gameMode = mode
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode))
    document.getElementById('diffSelect').classList.toggle('show', mode === 'pvc')
    headerSub.textContent = mode === 'pvp' ? '雙人對戰' : '與電腦對戰'
    updatePlayerLabels()
    resetAll()
  }

  function onDiffChange() {
    diffLevel = document.getElementById('diffLevel').value
  }

  function updatePlayerLabels() {
    const p1 = document.getElementById('player1Label')
    const p2 = document.getElementById('player2Label')
    if (gameMode === 'pvc') {
      p1.textContent = '玩家'
      p2.textContent = '電腦'
    } else {
      p1.textContent = '玩家1'
      p2.textContent = '玩家2'
    }
  }

  function resetBoard() {
    board = Array(9).fill(null)
    currentPlayer = 'X'
    gameActive = true
    resultArea.innerHTML = ''
    cancelComputerMove()
    updateScores()
    render()
    updateTurn()
  }

  function resetAll() {
    scores = { X: 0, O: 0, draw: 0 }
    history = []
    resetBoard()
    historyList.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">尚無紀錄</div>'
  }

  function render() {
    boardEl.innerHTML = ''
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div')
      cell.className = 'cell'
      if (board[i]) {
        cell.classList.add(board[i].toLowerCase())
        cell.textContent = board[i] === 'X' ? '✕' : '⭕'
      }
      if (!gameActive || board[i]) cell.classList.add('disabled')
      cell.dataset.idx = i
      cell.addEventListener('click', () => handleMove(i))
      boardEl.appendChild(cell)
    }
  }

  function handleMove(idx, isComputer = false) {
    if (!gameActive || board[idx]) return
    if (!isComputer && gameMode === 'pvc' && currentPlayer === 'O') return

    board[idx] = currentPlayer
    render()

    const win = checkWin(idx)
    if (win) {
      endGame(currentPlayer)
      return
    }

    if (board.every(c => c)) {
      endDraw()
      return
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X'
    updateTurn()

    if (gameMode === 'pvc' && currentPlayer === 'O' && gameActive) {
      scheduleComputerMove()
    }
  }

  function scheduleComputerMove() {
    cancelComputerMove()
    computerTimeout = setTimeout(() => {
      if (!gameActive) return
      const move = getComputerMove()
      if (move !== -1) handleMove(move, true)
    }, 350)
  }

  function cancelComputerMove() {
    if (computerTimeout) {
      clearTimeout(computerTimeout)
      computerTimeout = null
    }
  }

  function getComputerMove() {
    const available = board.map((v, i) => v === null ? i : -1).filter(i => i !== -1)
    if (available.length === 0) return -1

    if (diffLevel === 'easy') {
      return available[Math.floor(Math.random() * available.length)]
    }

    if (diffLevel === 'medium') {
      const r = Math.random()
      if (r < 0.4) return available[Math.floor(Math.random() * available.length)]
    }

    return minimax(board, 'O').idx
  }

  function minimax(curBoard, player, alpha = -Infinity, beta = Infinity) {
    const winner = getWinner(curBoard)
    if (winner === 'O') return { score: 10 }
    if (winner === 'X') return { score: -10 }
    if (curBoard.every(c => c)) return { score: 0 }

    const moves = curBoard.map((v, i) => v === null ? i : -1).filter(i => i !== -1)
    let best = player === 'O' ? { score: -Infinity } : { score: Infinity }

    for (const idx of moves) {
      curBoard[idx] = player
      const result = minimax(curBoard, player === 'O' ? 'X' : 'O', alpha, beta)
      curBoard[idx] = null
      result.idx = idx

      if (player === 'O') {
        if (result.score > best.score) best = result
        alpha = Math.max(alpha, best.score)
      } else {
        if (result.score < best.score) best = result
        beta = Math.min(beta, best.score)
      }
      if (beta <= alpha) break
    }
    return best
  }

  function getWinner(curBoard) {
    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ]
    for (const [a,b,c] of lines) {
      if (curBoard[a] && curBoard[a] === curBoard[b] && curBoard[a] === curBoard[c])
        return curBoard[a]
    }
    return null
  }

  function checkWin(idx) {
    return getWinner(board)
  }

  function highlightWin(line) {
    const cells = boardEl.children
    for (const idx of line) {
      cells[idx].classList.add('win')
    }
  }

  function endGame(winner) {
    gameActive = false
    cancelComputerMove()
    scores[winner]++
    updateScores()
    const winLine = getWinLine()
    if (winLine) highlightWin(winLine)
    showResult(winner)
    const p1 = gameMode === 'pvc' ? '玩家' : '玩家1'
    const p2 = gameMode === 'pvc' ? '電腦' : '玩家2'
    const label = winner === 'X' ? `✕ ${p1}` : `⭕ ${p2}`
    history.push(`第 ${history.length + 1} 局：<span class="winner-${winner.toLowerCase()}">${label} 獲勝</span>`)
    updateHistory()
  }

  function endDraw() {
    gameActive = false
    cancelComputerMove()
    scores.draw++
    updateScores()
    showDraw()
    history.push(`第 ${history.length + 1} 局：<span class="winner-draw">平手</span>`)
    updateHistory()
  }

  function getWinLine() {
    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ]
    for (const line of lines) {
      const [a,b,c] = line
      if (board[a] && board[a] === board[b] && board[a] === board[c]) return line
    }
    return null
  }

  function showResult(winner) {
    const p1 = gameMode === 'pvc' ? '玩家' : '玩家1'
    const p2 = gameMode === 'pvc' ? '電腦' : '玩家2'
    const label = winner === 'X' ? `✕ ${p1}` : `⭕ ${p2}`
    const cls = winner === 'X' ? 'win-x' : 'win-o'
    resultArea.innerHTML = `<div class="result-banner ${cls}">🎉 ${label} 獲勝！</div>`
  }

  function showDraw() {
    resultArea.innerHTML = `<div class="result-banner draw">🤝 平手！</div>`
  }

  function updateTurn() {
    const x = document.getElementById('turnX')
    const o = document.getElementById('turnO')
    const arrow = document.getElementById('turnArrow')
    x.classList.toggle('active', currentPlayer === 'X')
    o.classList.toggle('active', currentPlayer === 'O')
    arrow.textContent = currentPlayer === 'X' ? '→' : '←'
  }

  function updateScores() {
    document.getElementById('scoreX').textContent = scores.X
    document.getElementById('scoreO').textContent = scores.O
    document.getElementById('scoreDraw').textContent = scores.draw
  }

  function updateHistory() {
    historyList.innerHTML = history.map(h =>
      `<div class="history-item">${h}</div>`
    ).join('')
  }

  init()
</script>
</body>
</html>
