<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄鐘計時器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --work-primary: #FF6B35;
    --work-secondary: #FF8F5E;
    --work-bg: #2D1B14;
    --work-glow: rgba(255, 107, 53, 0.3);
    --break-primary: #4ECDC4;
    --break-secondary: #7EDDD6;
    --break-bg: #142B28;
    --break-glow: rgba(78, 205, 196, 0.3);
    --surface: rgba(255, 255, 255, 0.06);
    --surface-hover: rgba(255, 255, 255, 0.1);
    --text: #F0E9E4;
    --text-dim: rgba(240, 233, 228, 0.5);
    --radius: 16px;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Rubik', sans-serif;
    background: var(--work-bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.6s ease;
    overflow: hidden;
    position: relative;
  }

  body.break-mode {
    background: var(--break-bg);
  }

  /* 背景裝飾圓圈 */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    transition: all 0.8s ease;
    pointer-events: none;
  }
  .bg-orb-1 {
    width: 500px; height: 500px;
    background: var(--work-primary);
    top: -150px; right: -100px;
  }
  .bg-orb-2 {
    width: 400px; height: 400px;
    background: var(--work-secondary);
    bottom: -100px; left: -80px;
  }
  .break-mode .bg-orb-1 { background: var(--break-primary); }
  .break-mode .bg-orb-2 { background: var(--break-secondary); }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 24px;
  }

  /* 番茄圖示 */
  .tomato-icon {
    width: 64px;
    height: 64px;
    filter: drop-shadow(0 4px 20px rgba(255, 107, 53, 0.4));
    transition: filter 0.6s ease;
  }
  .break-mode .tomato-icon {
    filter: drop-shadow(0 4px 20px rgba(78, 205, 196, 0.3));
  }
  .tomato-icon svg {
    width: 100%;
    height: 100%;
  }
  @keyframes tomato-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .tomato-icon.active {
    animation: tomato-bounce 2s ease-in-out infinite;
  }

  /* 模式切換按鈕組 */
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 60px;
    padding: 4px;
    gap: 2px;
  }
  .mode-btn {
    padding: 10px 28px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .mode-btn.active {
    background: var(--work-primary);
    color: #fff;
    box-shadow: 0 4px 15px var(--work-glow);
  }
  .break-mode .mode-btn.active {
    background: var(--break-primary);
    box-shadow: 0 4px 15px var(--break-glow);
  }

  /* 計時器主體 */
  .timer-ring {
    position: relative;
    width: 320px;
    height: 320px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .timer-ring .bg-circle {
    fill: none;
    stroke: var(--surface);
    stroke-width: 6;
  }

  .timer-ring .progress-circle {
    fill: none;
    stroke: var(--work-primary);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 879.65;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.3s ease, stroke 0.6s ease;
  }

  .break-mode .timer-ring .progress-circle {
    stroke: var(--break-primary);
  }

  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .timer-display .time {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: 4px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .timer-display .label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 8px;
  }

  /* 控制按鈕 */
  .controls {
    display: flex;
    gap: 12px;
  }

  .ctrl-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: var(--surface);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    backdrop-filter: blur(4px);
  }
  .ctrl-btn:hover {
    background: var(--surface-hover);
    transform: scale(1.08);
  }
  .ctrl-btn:active {
    transform: scale(0.94);
  }
  .ctrl-btn.primary {
    width: 72px;
    height: 72px;
    font-size: 30px;
    background: var(--work-primary);
    box-shadow: 0 8px 30px var(--work-glow);
  }
  .ctrl-btn.primary:hover {
    background: var(--work-secondary);
    transform: scale(1.06);
  }
  .break-mode .ctrl-btn.primary {
    background: var(--break-primary);
    box-shadow: 0 8px 30px var(--break-glow);
  }
  .break-mode .ctrl-btn.primary:hover {
    background: var(--break-secondary);
  }

  /* 完成次數 */
  .session-counter {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .session-counter .dots {
    display: flex;
    gap: 6px;
  }
  .session-counter .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--surface);
    transition: all 0.4s ease;
  }
  .session-counter .dot.filled {
    background: var(--work-primary);
    box-shadow: 0 0 10px var(--work-glow);
  }
  .break-mode .session-counter .dot.filled {
    background: var(--break-primary);
    box-shadow: 0 0 10px var(--break-glow);
  }

  /* 完成動畫 */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px var(--work-glow); }
    50% { box-shadow: 0 0 60px var(--work-glow), 0 0 100px var(--work-glow); }
  }
  @keyframes pulse-glow-break {
    0%, 100% { box-shadow: 0 0 20px var(--break-glow); }
    50% { box-shadow: 0 0 60px var(--break-glow), 0 0 100px var(--break-glow); }
  }
  @keyframes ring-bell {
    0% { transform: rotate(0); }
    10% { transform: rotate(6deg); }
    20% { transform: rotate(-6deg); }
    30% { transform: rotate(4deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(2deg); }
    60% { transform: rotate(-2deg); }
    100% { transform: rotate(0); }
  }

  .timer-ring.alert .primary {
    animation: pulse-glow 0.8s ease-in-out 3;
  }
  .break-mode .timer-ring.alert .primary {
    animation: pulse-glow-break 0.8s ease-in-out 3;
  }
  .timer-ring.ringing .timer-display {
    animation: ring-bell 0.5s ease;
  }

  /* 響應式 */
  @media (max-width: 420px) {
    .timer-ring { width: 260px; height: 260px; }
    .timer-display .time { font-size: 56px; }
    .container { gap: 24px; padding: 24px 16px; }
    .ctrl-btn.primary { width: 64px; height: 64px; font-size: 26px; }
  }
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="container">
  <!-- 番茄圖示 -->
  <div class="tomato-icon active" id="tomatoIcon">
    <svg viewBox="0 0 100 100">
      <defs>
        <radialGradient id="tomatoGrad" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#FF6B35"/>
          <stop offset="70%" stop-color="#E8451A"/>
          <stop offset="100%" stop-color="#C42E0A"/>
        </radialGradient>
        <radialGradient id="tomatoShine" cx="35%" cy="30%" r="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <!-- 番茄本體 -->
      <path d="M50 12 C28 8 8 28 10 50 C12 72 30 90 50 92 C70 90 88 72 90 50 C92 28 72 8 50 12Z" fill="url(#tomatoGrad)"/>
      <!-- 頂部凹陷 -->
      <ellipse cx="50" cy="18" rx="14" ry="6" fill="#C42E0A" opacity="0.5"/>
      <!-- 高光 -->
      <ellipse cx="38" cy="38" rx="16" ry="12" fill="url(#tomatoShine)"/>
      <!-- 蒂頭 -->
      <path d="M50 12 C48 4 42 0 38 2 C42 4 46 8 48 12" fill="#4A7C3F"/>
      <path d="M50 12 C52 4 58 0 62 2 C58 4 54 8 52 12" fill="#4A7C3F"/>
      <path d="M50 12 C50 2 50 -2 50 -3 C50 -2 50 2 50 12" fill="#3A6632"/>
      <!-- 葉子 -->
      <path d="M50 14 C44 10 36 8 34 12 C38 12 44 14 50 14" fill="#5C9E4A" opacity="0.8"/>
      <path d="M50 14 C56 10 64 8 66 12 C62 12 56 14 50 14" fill="#5C9E4A" opacity="0.8"/>
      <path d="M50 14 C50 8 50 4 52 6 C51 8 50 12 50 14" fill="#5C9E4A" opacity="0.6"/>
    </svg>
  </div>

  <!-- 模式切換 -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="work">專注</button>
    <button class="mode-btn" data-mode="break">休息</button>
  </div>

  <!-- 計時器 -->
  <div class="timer-ring" id="timerRing">
    <svg viewBox="0 0 290 290">
      <circle class="bg-circle" cx="145" cy="145" r="140"/>
      <circle class="progress-circle" cx="145" cy="145" r="140" id="progressCircle"/>
    </svg>
    <div class="timer-display">
      <div class="time" id="timeDisplay">25:00</div>
      <div class="label" id="statusLabel">專注時間</div>
    </div>
  </div>

  <!-- 控制按鈕 -->
  <div class="controls">
    <button class="ctrl-btn" id="resetBtn" title="重設">↺</button>
    <button class="ctrl-btn primary" id="mainBtn" title="開始">▶</button>
    <button class="ctrl-btn" id="skipBtn" title="跳過">⏭</button>
  </div>

  <!-- 完成次數 -->
  <div class="session-counter">
    <span>今日完成</span>
    <div class="dots" id="sessionDots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
const C = {
  WORK: 25 * 60,
  BREAK: 5 * 60,
  LONG_BREAK: 15 * 60,
  TOTAL_SESSIONS: 5,
  CIRCUMFERENCE: 879.65
};

let state = {
  mode: 'work',
  timeLeft: C.WORK,
  totalTime: C.WORK,
  isRunning: false,
  sessions: 0,
  timerId: null,
  isAlerting: false,
  longBreakPending: false
};

const DOM = {
  body: document.body,
  ring: document.getElementById('timerRing'),
  time: document.getElementById('timeDisplay'),
  label: document.getElementById('statusLabel'),
  progress: document.getElementById('progressCircle'),
  mainBtn: document.getElementById('mainBtn'),
  resetBtn: document.getElementById('resetBtn'),
  skipBtn: document.getElementById('skipBtn'),
  modeBtns: document.querySelectorAll('.mode-btn'),
  dots: document.querySelectorAll('.dot'),
  tomato: document.getElementById('tomatoIcon')
};

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateDisplay() {
  DOM.time.textContent = formatTime(state.timeLeft);
  const progress = 1 - (state.timeLeft / state.totalTime);
  DOM.progress.style.strokeDashoffset = C.CIRCUMFERENCE * progress;
  DOM.label.textContent = state.mode === 'work' ? '專注時間' : '休息時間';
}

function updateModeUI() {
  const isBreak = state.mode === 'break';
  DOM.body.classList.toggle('break-mode', isBreak);
  DOM.modeBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === state.mode);
  });
}

function updateDots() {
  DOM.dots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < state.sessions);
  });
}

function switchMode(mode) {
  if (state.isRunning) stopTimer();
  state.mode = mode;
  state.isAlerting = false;
  DOM.ring.classList.remove('alert', 'ringing');
  if (mode === 'work') {
    state.totalTime = C.WORK;
    state.timeLeft = C.WORK;
  } else {
    const isLong = state.longBreakPending && state.sessions > 0 && state.sessions % 4 === 0;
    state.totalTime = isLong ? C.LONG_BREAK : C.BREAK;
    state.timeLeft = state.totalTime;
    state.longBreakPending = false;
  }
  updateModeUI();
  updateDisplay();
  DOM.mainBtn.textContent = '▶';
  clearInterval(state.timerId);
  state.timerId = null;
  state.isRunning = false;
}

function startTimer() {
  if (state.isAlerting) return;
  if (state.timeLeft <= 0) return;
  state.isRunning = true;
  DOM.mainBtn.textContent = '⏸';
  DOM.tomato.classList.add('active');
  DOM.ring.classList.remove('alert', 'ringing');

  state.timerId = setInterval(() => {
    state.timeLeft--;
    updateDisplay();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerId);
      state.timerId = null;
      state.isRunning = false;
      DOM.mainBtn.textContent = '▶';
      handleTimerEnd();
    }
  }, 1000);
}

function stopTimer() {
  state.isRunning = false;
  DOM.mainBtn.textContent = '▶';
  DOM.tomato.classList.remove('active');
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

function resetTimer() {
  stopTimer();
  state.isAlerting = false;
  DOM.ring.classList.remove('alert', 'ringing');
  if (state.mode === 'work') {
    state.totalTime = C.WORK;
    state.timeLeft = C.WORK;
  } else {
    state.totalTime = C.BREAK;
    state.timeLeft = C.BREAK;
  }
  updateDisplay();
}

function handleTimerEnd() {
  state.isAlerting = true;
  DOM.ring.classList.add('alert', 'ringing');
  setTimeout(() => DOM.ring.classList.remove('ringing'), 600);

  if (state.mode === 'work') {
    state.sessions++;
    updateDots();
    if (state.sessions % 4 === 0) {
      state.longBreakPending = true;
    }
    setTimeout(() => switchMode('break'), 1000);
  } else {
    setTimeout(() => switchMode('work'), 1000);
  }
}

function skipPhase() {
  stopTimer();
  state.isAlerting = false;
  DOM.ring.classList.remove('alert', 'ringing');
  if (state.mode === 'work') {
    state.sessions++;
    updateDots();
    if (state.sessions % 4 === 0) {
      state.longBreakPending = true;
    }
    switchMode('break');
  } else {
    switchMode('work');
  }
}

// 事件綁定
DOM.mainBtn.addEventListener('click', () => {
  if (state.isRunning) {
    stopTimer();
  } else {
    startTimer();
  }
});

DOM.resetBtn.addEventListener('click', resetTimer);
DOM.skipBtn.addEventListener('click', skipPhase);

DOM.modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.mode !== state.mode) {
      switchMode(btn.dataset.mode);
    }
  });
});

// 鍵盤快捷鍵
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    DOM.mainBtn.click();
  }
  if (e.key === 'r' || e.key === 'R') DOM.resetBtn.click();
});

// 初始化
updateDisplay();
updateDots();
</script>
</body>
</html>
